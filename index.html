<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NPB 2026 Player Lens</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">NPB 2026</p>
      <h1>Player Lens</h1>
    </div>
    <div class="status" id="status">CSV読込中</div>
  </header>

  <main class="shell">
    <section class="control-band" aria-label="ランキング操作">
      <div class="rank-switch" id="rankingButtons"></div>
      <div class="filters">
        <label>
          <span>球団</span>
          <select id="teamFilter"></select>
        </label>
        <label>
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="選手名">
        </label>
      </div>
    </section>

    <section class="summary-grid" id="summaryCards" aria-label="サマリー"></section>

    <section class="workspace">
      <div class="ranking-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow" id="rankingGroup">打者</p>
            <h2 id="rankingTitle">打者総合</h2>
          </div>
          <div class="count" id="resultCount"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="rankingHead"></thead>
            <tbody id="rankingBody"></tbody>
          </table>
        </div>
      </div>

      <aside class="detail-panel" id="detailPanel">
        <div class="empty-detail">選手を選択</div>
      </aside>
    </section>
  </main>

  <template id="summaryTemplate">
    <article class="summary-card">
      <span></span>
      <strong></strong>
    </article>
  </template>

  <script src="./assets/app.js" defer></script>
</body>
</html>

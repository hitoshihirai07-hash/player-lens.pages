<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="2026年のプロ野球選手成績を、打者・投手・若手・左右別などの切り口で見やすくまとめたデータランキングサイトです。">
  <title>Player Lens | プロ野球データランキング</title>
  <link rel="icon" href="./assets/player-lens-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand-block">
      <img class="site-icon" src="./assets/player-lens-icon.svg" alt="" aria-hidden="true">
      <div>
        <p class="eyebrow">NPB 2026</p>
        <h1>Player Lens</h1>
        <p class="lead">
          2026年のプロ野球選手成績をもとに、打者・投手・若手・左右別の強さをランキングで見られるサイトです。
          気になる選手を探したり、球団ごとの注目選手を比べたりできます。
        </p>
        <div class="topic-list" aria-label="掲載している内容">
          <span>打者ランキング</span>
          <span>投手ランキング</span>
          <span>若手選手</span>
          <span>左右別成績</span>
        </div>
      </div>
    </div>
    <div class="status" id="status">データ読込中</div>
  </header>

  <main class="shell">
    <section class="control-band" aria-label="ランキング操作">
      <div class="rank-switch" id="rankingButtons"></div>
      <div class="filters">
        <label>
          <span>球団</span>
          <select id="teamFilter"></select>
        </label>
        <label>
          <span>検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="選手名">
        </label>
      </div>
    </section>

    <section class="summary-grid" id="summaryCards" aria-label="サマリー"></section>

    <section class="workspace">
      <div class="ranking-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow" id="rankingGroup">打者</p>
            <h2 id="rankingTitle">打者総合</h2>
          </div>
          <div class="count" id="resultCount"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="rankingHead"></thead>
            <tbody id="rankingBody"></tbody>
          </table>
        </div>
      </div>

      <aside class="detail-panel" id="detailPanel">
        <div class="empty-detail">選手を選択</div>
      </aside>
    </section>
  </main>

  <template id="summaryTemplate">
    <article class="summary-card">
      <span></span>
      <strong></strong>
    </article>
  </template>

  <script src="./assets/app.js" defer></script>
</body>
</html>

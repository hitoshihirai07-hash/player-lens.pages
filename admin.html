<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>管理者ツール | Player Lens</title>
  <link rel="icon" href="./assets/player-lens-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="page-header">
    <a class="brand-mini" href="./index.html"><img src="./assets/player-lens-icon.svg" alt="">Player Lens</a>
    <h1>管理者ツール</h1>
    <p>データ更新日の確認、投稿文作成、自動チェックを行うための簡易管理ページです。</p>
  </header>

  <main class="content-shell">
    <section class="content-card admin-login" id="loginPanel">
      <h2>パスワード</h2>
      <p>管理者用パスワードを入力してください。</p>
      <div class="admin-login-row">
        <input id="adminPassword" type="password" autocomplete="current-password" placeholder="パスワード">
        <button class="text-link" id="loginButton" type="button">入る</button>
      </div>
      <p class="small-note" id="loginMessage"></p>
    </section>

    <section id="adminPanel" class="admin-panel" hidden>
      <section class="summary-grid" id="adminSummary"></section>

      <section class="content-card">
        <div class="section-heading">
          <h2>データ更新状況</h2>
          <button class="text-link" id="reloadAdmin" type="button">再読込</button>
        </div>
        <div class="compact-table-wrap">
          <table class="compact-table">
            <thead><tr><th>データ</th><th>件数</th><th>データ内更新日</th><th>配信日時</th></tr></thead>
            <tbody id="updateRows"></tbody>
          </table>
        </div>
      </section>

      <section class="content-card">
        <h2>X投稿文作成</h2>
        <div class="admin-controls">
          <label>
            <span>リーグ</span>
            <select id="tweetLeague">
              <option value="all">全体</option>
              <option value="セ">セ・リーグ</option>
              <option value="パ">パ・リーグ</option>
            </select>
          </label>
          <label>
            <span>球団</span>
            <select id="tweetTeam">
              <option value="all">全チーム</option>
            </select>
          </label>
          <label>
            <span>テーマ</span>
            <select id="tweetTheme">
              <option value="batter">打者総合トップ5</option>
              <option value="pitcher">投手総合トップ5</option>
              <option value="qualified-batter">規定打席トップ5</option>
              <option value="qualified-pitcher">規定投球回トップ5</option>
              <option value="young">若手注目トップ5</option>
              <option value="recent-batter">直近6日 野手トップ5</option>
              <option value="recent-pitcher">直近6日 投手トップ5</option>
              <option value="interleague-batter">交流戦 野手トップ5</option>
              <option value="interleague-pitcher">交流戦 投手トップ5</option>
              <option value="rookie-batter">新人王候補 野手トップ5</option>
              <option value="rookie-pitcher">新人王候補 投手トップ5</option>
              <option value="fielding">守備評価トップ5</option>
              <option value="catcher-caught">捕手盗塁阻止トップ5</option>
            </select>
          </label>
        </div>
        <textarea id="tweetOutput" rows="8"></textarea>
        <div class="admin-actions">
          <button class="text-link" id="buildTweet" type="button">作成</button>
          <button class="text-link" id="copyTweet" type="button">コピー</button>
        </div>
        <p class="small-note" id="copyMessage"></p>
      </section>

      <section class="content-card">
        <h2>自動チェック</h2>
        <div class="check-list" id="checkList"></div>
      </section>

      <section class="content-card">
        <h2>収益化準備チェック</h2>
        <div class="check-list" id="monetizationChecks"></div>
      </section>

      <section class="content-card">
        <h2>今日の投稿候補</h2>
        <div class="post-candidates" id="postCandidates"></div>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <a href="./index.html">ランキングへ戻る</a>
  </footer>
  <script src="./assets/site-data.js"></script>
  <script src="./assets/admin.js"></script>
</body>
</html>
